version: '3.8'

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb+srv://trung0971923110_db_user:Trung2004@builsanphamtheoyeucau.j4ckpyc.mongodb.net/sanpham?retryWrites=true&w=majority
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_PORT=3000
    depends_on:
      - backend

  # One-time seed job: runs the seed script against the mongo service and exits
  seed:
    build:
      context: ./backend
    command: ["node", "seedPC.js"]
    environment:
      - MONGODB_URI=mongodb+srv://trung0971923110_db_user:Trung2004@builsanphamtheoyeucau.j4ckpyc.mongodb.net/sanpham?retryWrites=true&w=majority
    depends_on:
      - mongo
    restart: "no"

volumes:
  mongo_data:
